  <text x="14" y="162" fill="#d4d4d4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">{&quot;success&quot;:true,&quot;stage&quot;:&quot;already_complete&quot;,&quot;token&quot;:{&quot;format&quot;:&quot;usesteady.resume-token.v1&quot;,&quot;workflow_run_id&quot;:&quot;3…</text>
