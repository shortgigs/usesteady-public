  <text x="14" y="108" fill="#00d4fa" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">$ ls &lt;WS&gt;</text>
  <text x="14" y="126" fill="#d4d4d4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">  [f]  DEPLOY.md             35B</text>
  <text x="14" y="144" fill="#d4d4d4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve"> </text>
  <text x="14" y="162" fill="#666666" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">$ # === Simulate interruption after task 1/2 (the run_command) ===</text>
  <text x="14" y="180" fill="#00d4fa" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">$ ls &lt;WS&gt;</text>
