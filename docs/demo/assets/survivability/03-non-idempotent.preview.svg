  <text x="14" y="216" fill="#d4d4d4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve"> </text>
  <text x="14" y="234" fill="#666666" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">$ # Resume WITHOUT --reexecute-non-idempotent: REFUSED.</text>
  <text x="14" y="252" fill="#00d4fa" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">$ usesteady run docs/demo/survivability/specs/03-non-idempotent.json \</text>
  <text x="14" y="270" fill="#d4d4d4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">    --yes --resume-from &lt;WS&gt;/.usesteady/resume-tokens/&lt;id&gt;.json</text>
  <text x="14" y="288" fill="#d4d4d4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve"> </text>
  <text x="14" y="306" fill="#d4d4d4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">Loaded spec: &quot;non-idempotent&quot; (2 task(s))</text>
  <text x="14" y="324" fill="#d4d4d4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">  Workspace:   &lt;WS&gt;</text>
  <text x="14" y="342" fill="#d4d4d4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve"> </text>
  <text x="14" y="360" fill="#ff5555" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">   Resume refused: 1 task(s) cannot be idempotency-checked.</text>
  <text x="14" y="378" fill="#d4d4d4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">    The workflow includes non-idempotent ops (append/prepend/replace/run/claude).</text>
  <text x="14" y="396" fill="#d4d4d4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">    Pass --reexecute-non-idempotent to opt in to re-prompting on those tasks.</text>
  <text x="14" y="414" fill="#d4d4d4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">    Run `usesteady workflow resume-info` for the full per-task report.</text>
